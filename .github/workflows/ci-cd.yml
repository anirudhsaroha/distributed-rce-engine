name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & test frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint || true
          npm test || true
          npm run build

      - name: Install & test api-gateway
        working-directory: ./api-gateway
        run: |
          npm ci
          # run lint if ESLint configured
          npx eslint . || true
          npm test || true

      - name: Install & test worker
        working-directory: ./worker
        run: |
          npm ci
          npm test || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  cd:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway image
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rce-api-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rce-api-gateway:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rce-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rce-worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rce-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rce-frontend:latest

      - name: Build and push sandbox image
        uses: docker/build-push-action@v4
        with:
          context: ./sandbox-image
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rce-sandbox:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rce-sandbox:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "Logging into GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${SSH_DEPLOY_PATH:-/home/${{ secrets.SSH_USER }}/rce}
            # pull latest images
            docker pull ghcr.io/${{ github.repository_owner }}/rce-api-gateway:latest
            docker pull ghcr.io/${{ github.repository_owner }}/rce-worker:latest
            docker pull ghcr.io/${{ github.repository_owner }}/rce-frontend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/rce-sandbox:latest
            # restart services (assumes docker-compose.yml exists on remote)
            docker compose pull || docker-compose pull
            docker compose up -d --remove-orphans || docker-compose up -d --remove-orphans

    env:
      # optional override on runner; useful to reference in remote script
      SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
